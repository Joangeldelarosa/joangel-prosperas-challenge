name: Deploy to AWS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: prosperas

jobs:
  # Run CI first
  ci:
    uses: ./.github/workflows/ci.yml

  # Build and push Docker images to ECR
  build-and-push:
    name: Build & Push to ECR
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-api:${{ steps.meta.outputs.image_tag }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.PROJECT_NAME }}-api:latest

  # Deploy infrastructure with Terraform
  deploy-infra:
    name: Deploy Infrastructure
    needs: build-and-push
    runs-on: ubuntu-latest

    outputs:
      api_url: ${{ steps.tf-outputs.outputs.api_url }}
      frontend_bucket: ${{ steps.tf-outputs.outputs.frontend_bucket }}
      frontend_url: ${{ steps.tf-outputs.outputs.frontend_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Plan
        working-directory: infra
        run: terraform plan -var="jwt_secret_key=${{ secrets.JWT_SECRET_KEY }}" -out=tfplan

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform outputs
        id: tf-outputs
        working-directory: infra
        run: |
          echo "api_url=$(terraform output -raw api_url)" >> "$GITHUB_OUTPUT"
          echo "frontend_bucket=$(terraform output -raw s3_frontend_bucket)" >> "$GITHUB_OUTPUT"
          echo "frontend_url=$(terraform output -raw frontend_url)" >> "$GITHUB_OUTPUT"

  # Deploy ECS services
  deploy-backend:
    name: Deploy Backend Services
    needs: [build-and-push, deploy-infra]
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update API service
        run: |
          aws ecs update-service \
            --cluster ${{ env.PROJECT_NAME }}-cluster \
            --service ${{ env.PROJECT_NAME }}-api \
            --force-new-deployment

      - name: Update Worker service
        run: |
          aws ecs update-service \
            --cluster ${{ env.PROJECT_NAME }}-cluster \
            --service ${{ env.PROJECT_NAME }}-worker \
            --force-new-deployment

      - name: Wait for API service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.PROJECT_NAME }}-cluster \
            --services ${{ env.PROJECT_NAME }}-api
        timeout-minutes: 10

  # Deploy frontend to S3 static website
  deploy-frontend:
    name: Build & Deploy Frontend
    needs: [deploy-infra]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build frontend with production API URL
        run: |
          cd frontend
          npm ci || npm install
          VITE_API_URL=${{ needs.deploy-infra.outputs.api_url }} npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ needs.deploy-infra.outputs.frontend_bucket }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp frontend/dist/index.html s3://${{ needs.deploy-infra.outputs.frontend_bucket }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

  # Health check
  health-check:
    name: Health Check
    needs: [deploy-backend, deploy-frontend, deploy-infra]
    runs-on: ubuntu-latest

    steps:
      - name: Check API health
        run: |
          echo "API URL: ${{ needs.deploy-infra.outputs.api_url }}"
          for i in $(seq 1 5); do
            RESPONSE=$(curl -s -w "\n%{http_code}" "${{ needs.deploy-infra.outputs.api_url }}/health" || true)
            HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -1)
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "API is healthy (HTTP $HTTP_STATUS)"
              echo "$BODY"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_STATUS — retrying in 15s..."
            sleep 15
          done
          echo "API health check failed after 5 attempts"
          exit 1
