services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,dynamodb,s3
      - DEBUG=0
      - AWS_DEFAULT_REGION=us-east-1
      - LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT=1
    volumes:
      - "localstack_data:/var/lib/localstack"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  aws-bootstrap:
    image: amazon/aws-cli:2.18.18
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - SQS_QUEUE_NAME=${SQS_QUEUE_NAME:-report-jobs}
      - SQS_DLQ_NAME=${SQS_DLQ_NAME:-report-jobs-dlq}
      - SQS_HIGH_PRIORITY_QUEUE_NAME=${SQS_HIGH_PRIORITY_QUEUE_NAME:-report-jobs-high}
      - SQS_HIGH_PRIORITY_DLQ_NAME=${SQS_HIGH_PRIORITY_DLQ_NAME:-report-jobs-high-dlq}
      - SQS_MAX_RECEIVE_COUNT=${SQS_MAX_RECEIVE_COUNT:-3}
      - DYNAMODB_JOBS_TABLE=${DYNAMODB_JOBS_TABLE:-jobs}
      - DYNAMODB_USERS_TABLE=${DYNAMODB_USERS_TABLE:-users}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-report-results}
    volumes:
      - "./localstack/init-aws.sh:/bootstrap/init-aws.sh:ro"
    entrypoint: ["/bin/sh", "/bootstrap/init-aws.sh"]
    restart: "no"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      # Override: inside Docker, localstack is reachable via service name
      - AWS_ENDPOINT_URL=http://localstack:4566
      - FRONTEND_URL=http://localhost:3000
      - JWT_SECRET_KEY=local-dev-secret-change-in-prod
    depends_on:
      aws-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.worker"]
    env_file:
      - ../.env
    environment:
      # Override: inside Docker, localstack is reachable via service name
      - AWS_ENDPOINT_URL=http://localstack:4566
      - JWT_SECRET_KEY=local-dev-secret-change-in-prod
    depends_on:
      aws-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  localstack_data:
