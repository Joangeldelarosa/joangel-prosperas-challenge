services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,dynamodb,s3
      - DEBUG=0
      - AWS_DEFAULT_REGION=us-east-1
      - LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT=1
    volumes:
      - "./localstack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh"
      - "localstack_data:/var/lib/localstack"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      # Override: inside Docker, localstack is reachable via service name
      - AWS_ENDPOINT_URL=http://localstack:4566
      - FRONTEND_URL=http://localhost:3000
      - JWT_SECRET_KEY=local-dev-secret-change-in-prod
    depends_on:
      localstack:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.worker"]
    env_file:
      - ../.env
    environment:
      # Override: inside Docker, localstack is reachable via service name
      - AWS_ENDPOINT_URL=http://localstack:4566
      - JWT_SECRET_KEY=local-dev-secret-change-in-prod
    depends_on:
      localstack:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  localstack_data:
